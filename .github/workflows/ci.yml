name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/*
      - feat/*
  workflow_dispatch:

env:
  app_name: 'jobhubmine'
  registry: 'ghcr.io/${{ github.repository }}'

jobs:

  build-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scraper
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.registry }}/scraper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ env.registry }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: web/
          file: web/Dockerfile
          push: true
          tags: ${{ env.registry }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  run-scraper:
    runs-on: ubuntu-latest
    needs: build-scraper
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scraper with volume mount
        run: |
          docker pull ${{ env.registry }}/scraper:latest
          docker run --rm -v "${{ github.workspace }}/out:/app/out" \
            ${{ env.registry }}/scraper:latest

      - name: Find latest database
        run: |
          ls -lt out/*.db | head -1 | awk '{print $9}' > latest_db.txt
          LATEST_DB=$(cat latest_db.txt)
          echo "outfile=$LATEST_DB" >> $GITHUB_ENV

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobhubmine_from_csv.db
          path: out/*.db
          compression-level: 0
