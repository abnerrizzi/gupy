name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feature/*
      - feat/*
  workflow_dispatch:

env:
  app_name: 'gupy'
  registry: 'ghcr.io/${{ github.repository }}'

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build scraper
        run: |
          docker build -t ${{ env.registry }}/scraper:latest \
            -f Dockerfile.scraper .

      - name: Build api
        run: |
          docker build -t ${{ env.registry }}/api:latest \
            -f api/Dockerfile .

      - name: Build web
        run: |
          docker build -t ${{ env.registry }}/web:latest \
            -f web/Dockerfile web/

      - name: Push images
        run: |
          docker push ${{ env.registry }}/scraper:latest
          docker push ${{ env.registry }}/api:latest
          docker push ${{ env.registry }}/web:latest


  run-scraper:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run scraper with volume mount
        run: |
          docker run --rm -v "${{ github.workspace }}/out:/app/out" \
            ${{ env.registry }}/scraper:latest

      - name: Find latest database
        run: |
          ls -lt out/*.db | head -1 | awk '{print $9}' > latest_db.txt
          LATEST_DB=$(cat latest_db.txt)
          echo "outfile=$LATEST_DB" >> $GITHUB_ENV

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: gupy_from_csv.db
          path: out/*.db
          compression-level: 0
