services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ./run_scrap.sh
      #entrypoint: ["/bin/sleep", "infinity"]
    volumes:
      - ./out:/app/out
    profiles:
      - scraper

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    volumes:
      - ./out:/app/out
    ports:
      - "5000:5000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - API_URL=http://api:5000
