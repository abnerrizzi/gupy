services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    command: ["./run_scrap.sh", "out"]
    volumes:
      - ./out:/app/out
    profiles:
      - scraper

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    volumes:
      - ./out:/app/out
    expose:
      - "5000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"
    environment:
      - API_URL=http://api:5000
    restart: unless-stopped

  selenium:
    image: selenium/standalone-firefox:latest
    shm_size: "2gb"
    ports:
      - "4444:4444"   # WebDriver endpoint
      - "7900:7900"   # noVNC web viewer → http://localhost:7900
      - "5900:5900"   # raw VNC → vnc://localhost:5900
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_VNC_NO_PASSWORD=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "no"

  scraper-linkedin:
    build:
      context: ./scrapers/linkedin-ff-selenium
      dockerfile: Dockerfile
    depends_on:
      selenium:
        condition: service_healthy
    env_file:
      - .env_sample
      - path: .env
        required: false
    environment:
      - SELENIUM_URL=http://selenium:4444/wd/hub
    volumes:
      - ./scrapers/linkedin-ff-selenium/logs:/app/logs
      - ./out/selenium:/app/out
    restart: "no"
