services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}
      - LINKEDIN_TIME_POSTED=${LINKEDIN_TIME_POSTED:-}
      - LINKEDIN_WORKPLACE_TYPE=${LINKEDIN_WORKPLACE_TYPE:-}
      - LINKEDIN_EXPERIENCE=${LINKEDIN_EXPERIENCE:-}
      - LINKEDIN_JOB_TYPE=${LINKEDIN_JOB_TYPE:-}
    env_file: .env
    command: ["./run_scrap.sh", "out"]
    volumes:
      - ./out:/app/out
    profiles:
      - scraper

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - PUID=${UID:-1000}
      - PGID=${GID:-1000}
    env_file: .env
    volumes:
      - ./out:/app/out
    expose:
      - "5000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"
    environment:
      - API_URL=http://api:5000
    restart: unless-stopped
