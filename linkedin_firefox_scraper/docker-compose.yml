services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - DEBUG=1
    ports:
      - "5900:5900"
    command: ["./run_scrap.sh", "out"]
    volumes:
      - ./out:/app/out
    profiles:
      - scraper

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    volumes:
      - ./out:/app/out
    expose:
      - "5000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - API_URL=http://api:5000
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped